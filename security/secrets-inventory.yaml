  - name: gitea-api-token
    description: Gitea API token for deploy-webhook + ops scripts (single value mirrored across Netcup + local dev box).
    category: api-key
    location:
      type: multi-file
      paths:
        - server: netcup
          path: /root/.secrets/gitea_token
        - server: local
          path: ~/.secrets/private/gitea_token
    consumers:
      - service: deploy-webhook
        kind: docker
        action: docker restart deploy-webhook  # re-reads the Docker secret file
      - kind: cli
        notes: "Local tea CLI (~/bin/tea) + ad-hoc scripts. Both file copies are kept in sync by the rotation script."
    rotation:
      mode: auto
      script: rotate-gitea-api-token.sh
    cadence_days: 365
    last_rotated: 2026-05-15
    notes: |
      Self-hosted Gitea → admin CLI mints tokens (no browser, unlike
      GitHub PAT). Script reads the OLD token's scope from gitea-db and
      preserves it, swaps both file copies, restarts deploy-webhook,
      smoke-tests /api/v1/user, then surgically deletes the old token
      row by its token_last_eight. Proven via live rotation 2026-05-15.

