  - name: falkordb-password
    description: FalkorDB (Redis-protocol graph DB) password. Gates GRAPH.* commands and Cypher queries. Used by rspace-online KOI store (when KOI_STORE=falkordb), the falkormem MCP server, and the falkor-cypher MCP server.
    category: password
    location:
      type: file
      server: netcup
      path: /opt/apps/falkordb/.env  # FALKORDB_PASSWORD
    consumers:
      - service: falkordb
        kind: docker
        action: docker restart falkordb  # picks up via REDIS_ARGS env on next start
      - kind: client
        notes: "rspace-online (KOI_STORE=falkordb), falkormem MCP, falkor-cypher MCP — update each client's connection string after rotating."
    rotation:
      mode: auto
      script: rotate-falkordb-password.sh
    cadence_days: 180
    last_rotated: 2026-05-09  # initial deploy date per memory
    notes: |
      Rotation script rotates the server-side requirepass (via Redis CONFIG SET
      while authenticated with the OLD password, then writes new value to .env
      and recreates the container). Downstream clients (rspace-online KOI
      store, falkormem MCP, falkor-cypher MCP) are NOT auto-updated — the
      script prints a reminder. Update each client's connection string in
      lockstep, otherwise they'll fail to connect.

