# Secret rotation inventory
#
# Single source of truth for every secret that should be rotated on a cadence.
# Each entry maps a logical secret to its storage location, its consumers, and
# the rotation method (auto via script, or manual via runbook).
#
# Field reference:
#   name           — short stable id, used in script flags
#   description    — what this secret protects / what it's used for
#   category       — webhook | api-key | password | cert | jwt
#   location       — where the canonical value lives
#                      type: file       → server + path
#                      type: infisical  → project + path
#                      type: external   → "Anthropic console" etc. (manual only)
#   consumers      — list of services/files/apps that need to be updated
#                    when the secret changes. The rotation script uses this
#                    to know what to PATCH/restart.
#   rotation       — auto (script:<filename>) | manual (runbook:<filename>)
#   cadence_days   — how often this should rotate (90 / 180 / 365)
#   last_rotated   — YYYY-MM-DD; set by rotation scripts on success
#   notes          — anything operators need to know
#
# `check-rotation-due.sh` reads this file and emails Jeff when entries are
# within 14 days of (last_rotated + cadence_days). Rotation scripts update
# `last_rotated` atomically on success.

secrets:

  - name: gitea-webhook-secret
    description: HMAC secret signing Gitea push webhooks → /opt/deploy-webhook
    category: webhook
    location:
      type: file
      server: netcup
      path: /root/.secrets/webhook_secret
    consumers:
      - service: deploy-webhook
        kind: docker
        action: docker restart deploy-webhook
      - kind: gitea-webhooks
        filter: "url contains deploy.jeffemmett.com"
        # ~100 hooks across the Gitea instance share this value;
        # rotation script updates them all via API in one pass.
    rotation:
      mode: auto
      script: rotate-gitea-webhook.sh
    cadence_days: 180
    last_rotated: 2026-05-01

  - name: github-webhook-secret
    description: HMAC secret signing GitHub push webhooks → /opt/deploy-webhook
    category: webhook
    location:
      type: file
      server: netcup
      path: /root/.secrets/github_webhook_secret
    consumers:
      - service: deploy-webhook
        kind: docker
        action: docker restart deploy-webhook
      - kind: github-webhooks
        filter: "URL contains deploy.jeffemmett.com"
    rotation:
      mode: manual          # GitHub webhook update needs gh CLI authed against each repo
      runbook: runbook-github-webhook-secret.md
    cadence_days: 180
    last_rotated: 2026-02-26

  - name: anthropic-api-key
    description: Anthropic API key used by Claude Code, custom agents, and inference services
    category: api-key
    location:
      type: external
      where: Anthropic console (https://console.anthropic.com/settings/keys)
    consumers:
      - kind: env-file
        path: /home/jeffe/Github/p2pwiki-content/.env
      - kind: env-file
        path: /home/jeffe/Github/pentagi-deploy/.env
      - kind: env-file-server
        server: netcup
        path: /opt/apps/erowid-bot/.env
      - kind: env-file-server
        server: netcup
        path: /opt/apps/p2pwiki-ai/.env
      - kind: env-file-server
        server: netcup
        path: /opt/apps/pentagi/.env
      - kind: env-file-server
        server: netcup
        path: /opt/apps/unicart/.env
      - kind: shell-env
        notes: "Claude Code CLI — check ~/.claude/settings.json, shell rc files for ANTHROPIC_API_KEY"
    rotation:
      mode: manual
      runbook: runbook-anthropic-api-key.md
    cadence_days: 90        # tighter cadence; this is a high-blast-radius key
    last_rotated: 2026-04-27 # placeholder — set on first rotation

  - name: claude-jeffemmett-mailcow
    description: Mailcow IMAP/SMTP password for the unified claude@jeffemmett.com sender
    category: password
    location:
      type: file
      server: local
      path: ~/.secrets/private/claude_jeffemmett_password
    consumers:
      - kind: agent
        path: /home/jeffe/Github/dev-ops/agents/claude-mail-agent/.env
      - kind: backlog-reply-handler
        server: netcup
        path: agents/backlog-reply-handler
      - kind: mailcow-mailbox
        admin_url: https://mail.jeffemmett.com
        notes: "Update via Mailcow admin UI → Mail Setup → Mailboxes → claude@"
    rotation:
      mode: manual
      runbook: runbook-claude-jeffemmett-mailcow.md
    cadence_days: 180
    last_rotated: 2026-04-10

  - name: cloudflare-api-token
    description: Cloudflare API token for tunnel + DNS automation
    category: api-key
    location:
      type: external
      where: Cloudflare dashboard (https://dash.cloudflare.com/profile/api-tokens)
    consumers:
      - kind: ssh-agent
        notes: "See ~/.claude/context/credentials.md for full list"
    rotation:
      mode: manual
      runbook: runbook-cloudflare-api-token.md
    cadence_days: 365
    last_rotated: 2026-04-27 # placeholder

  - name: gitea-api-token
    description: Gitea API token for deploy-webhook + ops scripts
    category: api-key
    location:
      type: file
      server: netcup
      path: /root/.secrets/gitea_token
    consumers:
      - service: deploy-webhook
        kind: docker
        action: docker restart deploy-webhook
    rotation:
      mode: manual
      runbook: runbook-gitea-api-token.md
    cadence_days: 365
    last_rotated: 2026-04-27 # placeholder

  - name: porkbun-api-key
    description: Porkbun API key for domain automation
    category: api-key
    location:
      type: external
      where: Porkbun account (https://porkbun.com/account/api)
    consumers:
      - kind: scripts
        notes: "See ~/.claude/context/credentials.md"
    rotation:
      mode: manual
      runbook: runbook-porkbun-api-key.md
    cadence_days: 365
    last_rotated: 2026-04-27 # placeholder

  - name: engine-pool-auth-token
    description: Bearer token gating /jobs/* on morpheus-engine-pool. Shared across server + every forge that calls into the pool. Rotation must update all .env files atomically and restart server first (so the new token is accepted before clients send it).
    category: jwt
    location:
      type: multi-file
      server: netcup
      paths:
        - /opt/services/morpheus-engine-pool/.env
        - /opt/clip-forge/.env
        - /opt/services/image-forge/.env
    consumers:
      - service: engine-pool-server
        kind: docker
        action: docker restart engine-pool-server
      - service: clip-forge-backend-1
        kind: docker
        action: cd /opt/clip-forge && docker compose up -d --no-deps backend
      - service: image-forge
        kind: docker
        action: docker restart image-forge
    rotation:
      mode: auto
      script: rotate-engine-pool-token.sh
    cadence_days: 90
    last_rotated: 2026-05-01

  - name: vaultwarden-admin-token
    description: Vaultwarden admin-panel auth — passphrase that hashes to the ADMIN_TOKEN env value. Single auth gate for /admin (SMTP config, user invites, settings.json edits). CF Access on /admin is a planned second layer (TASK-LOW.7).
    category: password
    location:
      type: multi-file
      paths:
        - server: local
          path: ~/.secrets/private/vaultwarden_admin_passphrase_jeff.txt  # plaintext, source of truth
        - server: netcup
          path: /opt/apps/vaultwarden/.env  # VW_ADMIN_TOKEN = argon2id(plaintext)
    consumers:
      - service: vaultwarden
        kind: docker
        action: cd /opt/apps/vaultwarden && docker compose up -d  # picks up new ADMIN_TOKEN env
    rotation:
      mode: manual
      runbook: runbook-vaultwarden-admin-token.md  # stub — write when first rotated
    cadence_days: 365
    last_rotated: 2026-05-09  # initial deploy date per memory
    notes: |
      Rotation = regenerate passphrase, compute argon2id PHC string, double the
      $ → $$ for compose env interpolation, update VW_ADMIN_TOKEN in .env,
      compose up, login-test. Plaintext + hash MUST stay in sync.

  - name: kuma-admin-password
    description: Uptime Kuma admin login (user "jeffemmett") and the same value used by kuma-alert-agent to drive Socket.IO API for monitor CRUD. Source of truth = Infisical; injected into the agent container at startup via the Infisical entrypoint wrapper.
    category: password
    location:
      type: infisical
      project: kuma-alert-agent  # verify exact slug during rotation
      path: /KUMA_PASSWORD
    consumers:
      - service: kuma-alert-agent
        kind: docker
        action: docker restart kuma-alert-agent
      - kind: web-ui
        notes: "Update via Kuma admin UI → Settings → Account → Change password BEFORE updating Infisical, then refresh the agent."
    rotation:
      mode: manual
      runbook: runbook-kuma-admin-password.md  # stub
    cadence_days: 365
    last_rotated: 1970-01-01
    notes: |
      Order matters: change in Kuma UI FIRST, then update Infisical, then restart
      kuma-alert-agent. Otherwise the agent will lose access until both are aligned.

  - name: kuma-api-key
    description: Uptime Kuma v1.x API key — used for badge/metrics endpoints and Prometheus scraping. Does NOT grant monitor CRUD (that needs admin credentials via Socket.IO).
    category: api-key
    location:
      type: file
      server: local
      path: ~/.secrets/private/kuma_api_key
    consumers:
      - kind: unknown
        notes: "Audit which scripts/dashboards consume this before rotating; grep ~/Github and /opt for KUMA_API_KEY references."
    rotation:
      mode: manual
      runbook: runbook-kuma-api-key.md  # stub
    cadence_days: 365
    last_rotated: 1970-01-01

  - name: falkordb-password
    description: FalkorDB (Redis-protocol graph DB) password. Gates GRAPH.* commands and Cypher queries. Used by rspace-online KOI store (when KOI_STORE=falkordb), the falkormem MCP server, and the falkor-cypher MCP server.
    category: password
    location:
      type: file
      server: netcup
      path: /opt/apps/falkordb/.env  # FALKORDB_PASSWORD
    consumers:
      - service: falkordb
        kind: docker
        action: docker restart falkordb  # picks up via REDIS_ARGS env on next start
      - kind: client
        notes: "rspace-online (KOI_STORE=falkordb), falkormem MCP, falkor-cypher MCP — update each client's connection string after rotating."
    rotation:
      mode: manual          # auto candidate later — needs REDIS_ARGS-aware compose update
      runbook: runbook-falkordb-password.md  # stub
    cadence_days: 180
    last_rotated: 2026-05-09  # initial deploy date per memory
    notes: |
      Rotation requires updating EVERY client connection string in lockstep —
      otherwise clients will fail to connect. List of known clients lives in
      consumers; verify with `grep -rl FALKORDB_PASSWORD ~/Github /opt` before
      rotating. The MCP servers run locally on WSL2, not Netcup.

  - name: crowdsec-traefik-lapi-key
    description: CrowdSec LAPI bouncer API key used by the Traefik crowdsec-bouncer-traefik-plugin middleware. Gates ban-decision pull from CrowdSec → Traefik on both web + websecure entrypoints.
    category: api-key
    location:
      type: file
      server: netcup
      path: /root/traefik/config/crowdsec.yml
    consumers:
      - service: traefik
        kind: file-provider
        action: none  # Traefik file provider watches the dir and reloads automatically
    rotation:
      mode: auto
      script: rotate-crowdsec-traefik-lapi-key.sh
    cadence_days: 180
    last_rotated: 2026-05-14
    notes: |
      Live value lives only on Netcup at /root/traefik/config/crowdsec.yml
      (gitignored at netcup/traefik/.gitignore; sanitized .example committed).
      Originally exposed through a Claude session 2026-05-14 — TASK-87.
