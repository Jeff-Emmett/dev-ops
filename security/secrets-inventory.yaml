    category: jwt
    location:
      type: multi-file
      server: netcup
      paths:
        - /opt/services/morpheus-engine-pool/.env
        - /opt/clip-forge/.env
        - /opt/services/image-forge/.env
    consumers:
      - service: engine-pool-server
        kind: docker
        action: docker restart engine-pool-server
      - service: clip-forge-backend-1
        kind: docker
        action: cd /opt/clip-forge && docker compose up -d --no-deps backend
      - service: image-forge
        kind: docker
        action: docker restart image-forge
    rotation:
      mode: auto
      script: rotate-engine-pool-token.sh
    cadence_days: 90
    last_rotated: 2026-05-01

  - name: vaultwarden-admin-token
    description: Vaultwarden admin-panel auth — passphrase that hashes to the ADMIN_TOKEN env value. Single auth gate for /admin (SMTP config, user invites, settings.json edits). CF Access on /admin is a planned second layer (TASK-LOW.7).
    category: password
    location:
      type: multi-file
      paths:
        - server: local
          path: ~/.secrets/private/vaultwarden_admin_passphrase_jeff.txt  # plaintext, source of truth
        - server: netcup
          path: /opt/apps/vaultwarden/.env  # VW_ADMIN_TOKEN = argon2id(plaintext)
    consumers:
      - service: vaultwarden
        kind: docker
        action: cd /opt/apps/vaultwarden && docker compose up -d  # picks up new ADMIN_TOKEN env
    rotation:
      mode: auto
      script: rotate-vaultwarden-admin-token.sh
    cadence_days: 365
    last_rotated: 2026-05-09  # initial deploy date per memory
    notes: |
      Rotation script handles: generate passphrase → argon2id via vaultwarden
      container's built-in `vaultwarden hash` → write plaintext locally →
      double `$` → `$$` for compose interpolation → update VW_ADMIN_TOKEN in
      .env → compose up → login-test via loopback → inventory_mark_rotated.

  - name: kuma-admin-password
    description: Uptime Kuma admin login (user "jeffemmett") and the same value used by kuma-alert-agent to drive Socket.IO API for monitor CRUD. Source of truth = Infisical; injected into the agent container at startup via the Infisical entrypoint wrapper.
    category: password
    location:
      type: infisical
      project: kuma-alert-agent  # verify exact slug during rotation
      path: /KUMA_PASSWORD
    consumers:
      - service: kuma-alert-agent
        kind: docker
        action: docker restart kuma-alert-agent
      - kind: web-ui
        notes: "Update via Kuma admin UI → Settings → Account → Change password BEFORE updating Infisical, then refresh the agent."
    rotation:
      mode: manual
      runbook: runbook-kuma.md  # shared pattern
    cadence_days: 365
    last_rotated: 1970-01-01
    notes: |
      Order matters: change in Kuma UI FIRST, then update Infisical, then restart
      kuma-alert-agent. Otherwise the agent will lose access until both are aligned.

  - name: kuma-api-key
    description: Uptime Kuma v1.x API key — used for badge/metrics endpoints and Prometheus scraping. Does NOT grant monitor CRUD (that needs admin credentials via Socket.IO).
    category: api-key
    location:
