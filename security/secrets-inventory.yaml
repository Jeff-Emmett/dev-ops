  # Split 2026-05-15 from a single listmonk-postgres entry into two real DBs.
  # IMPORTANT (learned the hard way 2026-05-15): the generic
  # rotate-postgres-password.sh is UNSAFE for listmonk. LISTMONK_DB_PASSWORD
  # in .env only feeds the postgres container's POSTGRES_PASSWORD; the
  # listmonk APP reads its DB password from its own config (config.toml /
  # LISTMONK_db__password) which the generic script does NOT touch. A naive
  # rotation changes the DB side, the app keeps the old credential, and
  # `error fetching campaigns: pq: password authentication failed` floods
  # until you revert. The generic script's DB-only smoke test gave a FALSE
  # PASS. Both must be rotated in lockstep → manual runbook.
  - name: listmonk-main-postgres
    description: Postgres password for the main Listmonk instance (/opt/apps/listmonk, container listmonk-db). Split-config — DB pw lives in BOTH the postgres env AND the listmonk app config; rotate both together.
    category: password
    location:
      type: file
      server: netcup
      path: /opt/apps/listmonk/.env  # LISTMONK_DB_PASSWORD (postgres side only)
    consumers:
      - service: listmonk
        kind: docker
        notes: "App reads DB pw from its OWN config, not LISTMONK_DB_PASSWORD. Rotation must update app config too — see runbook."
    rotation:
      mode: manual
      runbook: runbook-listmonk-postgres.md
    cadence_days: 180
    last_rotated: 1970-01-01  # never successfully rotated (2026-05-15 attempt reverted)

  - name: xhiva-listmonk-postgres
    description: Postgres password for the Xhiva-mirror Listmonk instance (/opt/websites/xhivart-mirror/listmonk, container xhiva-listmonk-db). Same split-config caveat as listmonk-main-postgres.
    category: password
    location:
      type: file
      server: netcup
      path: /opt/websites/xhivart-mirror/listmonk/.env  # LISTMONK_DB_PASSWORD (postgres side only)
    consumers:
      - service: xhiva-listmonk
        kind: docker
        notes: "App reads DB pw from its OWN config. Rotate both sides together — see runbook. (LISTMONK_ADMIN_PASSWORD here is the UI admin, separate.)"
    rotation:
      mode: manual
      runbook: runbook-listmonk-postgres.md
    cadence_days: 180
    last_rotated: 1970-01-01  # never successfully rotated (2026-05-15 attempt reverted)

