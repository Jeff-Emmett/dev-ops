services:
  backlog-reply-handler:
    build: .
    container_name: backlog-reply-handler
    restart: always
    mem_limit: 256m
    env_file: .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      # Docker socket for exec into claude-dev
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent data (state, logs)
      - handler-data:/data
      # Infisical secret-injection wrapper — IMAP_PASS + SMTP_PASS fetched at startup.
      - /opt/infisical/entrypoint-wrapper.sh:/infisical-entrypoint.sh:ro
    entrypoint: ["/infisical-entrypoint.sh"]
    command: ["python", "-u", "handler.py"]
    networks:
      # Reach mail server
      - mailcow-network

volumes:
  handler-data:

networks:
  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network
