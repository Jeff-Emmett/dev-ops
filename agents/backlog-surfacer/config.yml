scan_paths:
  local:
    - /data/apps/*/backlog/
    - /data/websites/*/backlog/

schedules:
  morning: "0 9 * * 1-5"
  afternoon: "0 14 * * 1-5"
  weekly: "0 17 * * 5"
  monthly: "0 9 1 * *"

notifications:
  - type: file
    path: /tmp/backlog-briefing.md
  - type: email
    to: jeff@jeffemmett.com
    from: Jeff's Claude Agent <claude@jeffemmett.com>
    smtp_host: mail.rmail.online
    smtp_port: 587
    smtp_user: claude@jeffemmett.com

rules:
  stale_in_progress_days: 3
  stale_todo_days: 30
  high_priority_always_surface: true
