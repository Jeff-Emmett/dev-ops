# Gitea Actions CI/CD — Node/TypeScript Application
# Copy to: <repo>/.gitea/workflows/ci.yml
# Replace: __APP_NAME__, __DEPLOY_PATH__, __HEALTH_URL__
#
# Prerequisites:
# - User-level Gitea secrets: REGISTRY_TOKEN, REGISTRY_USER, DEPLOY_SSH_KEY, DEPLOY_HOST
# - Server-side compose uses: image: gitea.jeffemmett.com/jeffemmett/__APP_NAME__:${IMAGE_TAG:-latest}
# - Registry seeded with baseline: docker tag <current> gitea.jeffemmett.com/jeffemmett/__APP_NAME__:latest && docker push

name: CI/CD
# Runner capacity: 1 (sequential) to prevent OOM on shared host

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:3000
  IMAGE: localhost:3000/jeffemmett/__APP_NAME__

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
          git clone --depth 1 --branch ${{ github.ref_name }} http://token:${{ github.token }}@server:3000/${{ github.repository }}.git .

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run || npm test -- --run

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-and-build]
    runs-on: ubuntu-latest
    container:
      image: docker:cli
    steps:
      - name: Setup tools
        run: apk add --no-cache git openssh-client curl

      - name: Checkout
        run: git clone --depth 1 --branch ${{ github.ref_name }} http://token:${{ github.token }}@server:3000/${{ github.repository }}.git .

      - name: Set image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.IMAGE_TAG }} -t ${{ env.IMAGE }}:latest .
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker push ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "
            cd __DEPLOY_PATH__
            cat .last-deployed-tag 2>/dev/null > .rollback-tag || true
            echo '${{ env.IMAGE_TAG }}' > .last-deployed-tag
            docker pull ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --no-build
          "

      - name: Smoke test
        # Poll HTTP health up to 90s. A single sleep-then-curl pattern
        # races Next.js/Prisma cold start (commonly 30-60s on the
        # small Netcup runner). Only roll back when there's a previous
        # tag to fall back to — on first deploy .rollback-tag is empty
        # and `IMAGE_TAG= docker compose up` would be destructive.
        run: |
          HTTP_CODE="000"
          for i in $(seq 1 18); do
            sleep 5
            HTTP_CODE=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 15 __HEALTH_URL__ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Smoke test passed after ${i} poll(s) (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "  [poll ${i}/18] HTTP $HTTP_CODE"
          done

          echo "::error::Smoke test failed after 90s (last HTTP $HTTP_CODE)"
          ROLLBACK_TAG=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "cat __DEPLOY_PATH__/.rollback-tag 2>/dev/null" || echo "")
          if [ -n "$ROLLBACK_TAG" ]; then
            echo "Rolling back to $ROLLBACK_TAG"
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
              "cd __DEPLOY_PATH__ && IMAGE_TAG=$ROLLBACK_TAG docker compose up -d --no-build"
            echo "Rolled back to $ROLLBACK_TAG"
          else
            echo "No rollback tag available (first deploy?). Leaving current container in place."
          fi
          exit 1
