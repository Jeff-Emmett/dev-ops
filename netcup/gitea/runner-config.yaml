cache:
  dir: ''
  enabled: true
  host: ''
  port: 0
container:
  docker_host: ''
  force_pull: false
  network: gitea_gitea
  options: --cpus=2 --memory=4g --memory-swap=4g --pids-limit=512 --blkio-weight=100
  privileged: false
  valid_volumes:
  - /root/gitea/runner-cache
  - /var/run/docker.sock
  workdir_parent: null
host:
  workdir_parent: null
log:
  level: info
runner:
  capacity: 2
  fetch_interval: 10s
  fetch_timeout: 5s
  file: .runner
  insecure: false
  labels:
  - ubuntu-latest:docker://node:20-bookworm-slim
  - ubuntu-22.04:docker://node:20-bookworm-slim
  timeout: 3h
