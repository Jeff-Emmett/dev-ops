services:
  hcc-mem-staging:
    image: nginx:alpine
    container_name: hcc-mem-staging
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hcc-api
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.hcc-mem-staging.rule=Host(`hcc-mem-staging.jeffemmett.com`)"
      - "traefik.http.routers.hcc-mem-staging.entrypoints=web"
      - "traefik.http.services.hcc-mem-staging.loadbalancer.server.port=80"
    networks:
      - traefik-public
      - hcc-internal
    mem_limit: 64m
    cpus: 0.25

  hcc-api:
    build: ./api
    container_name: hcc-api
    restart: unless-stopped
    environment:
      CYCLOS_URL: "http://cyclos:8080"
      CYCLOS_NETWORK: "hcc_timebank"
      CYCLOS_AUTH: "admin:HccAdmin2026"
      PORT: "3001"
    mem_limit: 128m
    cpus: 0.25
    networks:
      - hcc-internal
      - cyclos-internal

networks:
  traefik-public:
    external: true
  hcc-internal:
    driver: bridge
  cyclos-internal:
    name: cyclos_cyclos-internal
    external: true
