# Block aggressive and malicious bots at the Apache level
# This fires BEFORE PHP, saving DB connections and CPU
# Uses Apache 2.4 <If> expressions which work in server config context

# Block known aggressive SEO crawlers (no value, just waste resources)
<Location "/">
    <If "%{HTTP_USER_AGENT} =~ /MJ12bot|AhrefsBot|SemrushBot|DotBot|BLEXBot|MegaIndex|Bytespider|PetalBot|Barkrowler|trendictionbot|IbouBot|Baiduspider|YandexBot|SeznamBot/i">
        Require all denied
    </If>
    # Block attack tools
    <If "%{HTTP_USER_AGENT} =~ /Nikto|sqlmap|Nmap|masscan|ZmEu/i">
        Require all denied
    </If>
    # Block empty user agents (vulnerability scanners)
    <If "-z %{HTTP_USER_AGENT}">
        Require all denied
    </If>
    # Block very old Chrome versions commonly faked by bots (Chrome 20-39)
    <If "%{HTTP_USER_AGENT} =~ m#Chrome/[23][0-9]\.#">
        Require all denied
    </If>
</Location>

# Block bots from expensive wiki operations (diffs, history, special pages)
<LocationMatch "^/index\.php">
    <If "%{QUERY_STRING} =~ /action=(history|diff|raw|render|info|purge)/ && %{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot/i">
        Require all denied
    </If>
</LocationMatch>

<LocationMatch "^/wiki/Special:">
    <If "%{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot/i">
        Require all denied
    </If>
</LocationMatch>

# Block access to xmlrpc.php (frequently exploited)
<Files "xmlrpc.php">
    Require all denied
</Files>

# Block direct access to wp-config.php
<Files "wp-config.php">
    Require all denied
</Files>
