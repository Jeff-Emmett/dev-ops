services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://passwords.jeffemmett.com"
      ADMIN_TOKEN: "${VW_ADMIN_TOKEN}"
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "true"
      SIGNUPS_VERIFY: "true"
      SHOW_PASSWORD_HINT: "false"
      WEB_VAULT_ENABLED: "true"
      ROCKET_PORT: "80"
      LOG_LEVEL: "warn"
      EXTENDED_LOGGING: "true"
      # Real-time sync (browser ext / mobile push notifications via WebSocket).
      # In VW 1.32+ the WS server runs on the same Rocket port — no extra
      # Traefik route needed; /notifications/hub is already on the host rule.
      WEBSOCKET_ENABLED: "true"
      SMTP_HOST: "mail.rmail.online"
      SMTP_PORT: "587"
      SMTP_SECURITY: "starttls"
      SMTP_FROM: "claude@jeffemmett.com"
      SMTP_FROM_NAME: "Vaultwarden"
      SMTP_USERNAME: "claude@jeffemmett.com"
      SMTP_PASSWORD: "${VW_SMTP_PASSWORD}"
    volumes:
      - vaultwarden-data:/data
    extra_hosts:
      - "mail.rmail.online:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # main router (HTTP via CF tunnel)
      - "traefik.http.routers.vaultwarden.rule=Host(`passwords.jeffemmett.com`)"
      - "traefik.http.routers.vaultwarden.entrypoints=web"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      # security headers
      - "traefik.http.routers.vaultwarden.middlewares=vaultwarden-headers"
      - "traefik.http.middlewares.vaultwarden-headers.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.vaultwarden-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.vaultwarden-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.vaultwarden-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.vaultwarden-headers.headers.referrerPolicy=same-origin"
    networks:
      - traefik-public

