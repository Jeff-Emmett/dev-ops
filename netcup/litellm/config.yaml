model_list:
  # === Anthropic (paid) ===
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192
      timeout: 300

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192
      timeout: 300

  # === Gemini (free tier, reliable) ===
  # Replaced local Ollama for qwen-coder/llama3/qwen — server RAM too constrained
  # for 8b+ models. Ollama kept only for llama3.2:1b (tiny).
  - model_name: llama3
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      timeout: 120

  - model_name: qwen-coder
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      timeout: 120

  - model_name: qwen
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      timeout: 120

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      timeout: 300

  # === Local Ollama (tiny models only — server has <5 GiB free RAM) ===
  - model_name: llama3-small
    litellm_params:
      model: ollama/llama3.2:1b
      api_base: http://10.0.45.1:11434
      timeout: 120
      stream: true

  # === RunPod vLLM Serverless (GPU on-demand) ===
  - model_name: qwen-coder-vllm
    litellm_params:
      model: openai/Qwen/Qwen2.5-Coder-7B-Instruct
      api_base: os.environ/RUNPOD_VLLM_BASE_URL
      api_key: os.environ/RUNPOD_API_KEY
      timeout: 120

  # === Strix Halo Ollama (home GPU — activate when device online) ===
  # Set STRIX_OLLAMA_URL=http://<tailscale-ip>:11434 in Infisical when device joins mesh
  #
  # - model_name: llama3-70b
  #   litellm_params:
  #     model: ollama/llama3.1:70b
  #     api_base: os.environ/STRIX_OLLAMA_URL
  #     timeout: 300
  #     stream: true
  #
  # - model_name: qwen-coder-32b
  #   litellm_params:
  #     model: ollama/qwen2.5-coder:32b
  #     api_base: os.environ/STRIX_OLLAMA_URL
  #     timeout: 300
  #     stream: true

  # === Load-balanced free model groups ===
  - model_name: cheap-code
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      timeout: 120
  - model_name: cheap-code  # fallback
    litellm_params:
      model: ollama/llama3.2:1b
      api_base: http://10.0.45.1:11434
      timeout: 120

litellm_settings:
  drop_params: true
  request_timeout: 300
  num_retries: 2
  set_verbose: false
  max_budget: 50.0
  budget_duration: "30d"

  default_fallbacks: ["llama3"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
