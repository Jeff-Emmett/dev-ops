services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    depends_on:
      litellm-db:
        condition: service_healthy

    # Infisical secret injection
    volumes:
      - /opt/infisical/entrypoint-wrapper.sh:/infisical-entrypoint.sh:ro
      - ./config.yaml:/app/config.yaml:ro
    entrypoint: ["/infisical-entrypoint.sh"]
    command:
      [
        "litellm",
        "--config",
        "/app/config.yaml",
        "--port",
        "4000",
        "--num_workers",
        "2",
      ]

    environment:
      INFISICAL_PROJECT_SLUG: litellm-proxy
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
      STORE_MODEL_IN_DB: "True"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTP via Cloudflare tunnel
      - "traefik.http.routers.litellm.rule=Host(`llm.jeffemmett.com`)"
      - "traefik.http.routers.litellm.entrypoints=web"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"
      # HTTPS with Let's Encrypt (direct access)
      - "traefik.http.routers.litellm-secure.rule=Host(`llm.jeffemmett.com`)"
      - "traefik.http.routers.litellm-secure.entrypoints=websecure"
      - "traefik.http.routers.litellm-secure.service=litellm"
      - "traefik.http.routers.litellm-secure.tls=true"
      - "traefik.http.routers.litellm-secure.tls.certresolver=letsencrypt"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - traefik-public
      - ai-internal
      - litellm-internal

    mem_limit: 2g
    cpus: 2

  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - litellm-internal

volumes:
  litellm-db-data:

networks:
  traefik-public:
    external: true
  ai-internal:
    external: true
  litellm-internal:
    driver: bridge
