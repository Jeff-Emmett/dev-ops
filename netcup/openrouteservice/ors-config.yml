ors:
  engine:
    source_file: /home/ors/files/europe-latest.osm.pbf
    profiles:
      driving-car:
        enabled: true
        profile: driving-car
        encoder_flags_size: 8
        elevation: true
        elevation_cache_path: /home/ors/elevation_cache
        instructions: true
        optimize: false
        traffic: false
        maximum_distance: 100000
        maximum_distance_dynamic_weights: 100000
        maximum_distance_avoid_areas: 100000
        maximum_waypoints: 50
        maximum_snapping_radius: 400
        location_index_resolution: 500
        location_index_level: 25
        force_turn_costs: false
        interpolate_bridges_and_tunnels: true
        preparation:
          min_network_size: 200
          methods:
            lm:
              enabled: true
              threads: 4
              weightings: fastest,shortest
              landmarks: 16
        execution:
          methods:
            lm:
              active_landmarks: 8
    init_threads: 4
    preparation_mode: false
    config_output: /home/ors/logs/ors-config-export.json
    graphs_root_path: /home/ors/graphs
    graphs_data_access: MMAP
  endpoints:
    routing:
      enabled: true
      attribution: openrouteservice.org, OpenStreetMap contributors
      gpx_name: ORSRouting
      gpx_description: This is a routing file from openrouteservice
      gpx_base_url: https://openrouteservice.org/
      gpx_support_mail: support@openrouteservice.org
      gpx_author: openrouteservice
      gpx_content_licence: LGPL 3.0
    isochrones:
      enabled: true
      attribution: openrouteservice.org, OpenStreetMap contributors
      maximum_range_distance:
        - profiles: driving-car
          value: 120000
      maximum_range_time:
        - profiles: driving-car
          value: 18000
      maximum_intervals: 10
      maximum_locations: 2
      allow_compute_area: true
    matrix:
      enabled: true
      attribution: openrouteservice.org, OpenStreetMap contributors
      maximum_routes: 100
      maximum_routes_recommended: 25
      maximum_visited_nodes: 100000
      maximum_search_radius: 2000
      maximum_weight: -1
    snap:
      enabled: true
      attribution: openrouteservice.org, OpenStreetMap contributors
    optimization:
      enabled: false
