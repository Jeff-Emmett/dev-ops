# Penpot — self-hosted open-source design/prototyping tool (the Figma vertical).
# penpot.jeffemmett.com. Sablier scale-to-zero: the whole group stops when idle
# (saves ~1.2-1.7 GB on the pressured host) and wakes on the first request.
#
# Adapted from the official penpotapp compose (v2.16). Differences:
#   - no penpot-mcp / penpot-mailcatch (dev-only); email verification disabled
#   - registration DISABLED (public endpoint) — users created via backend CLI
#   - Traefik routing via the FILE provider (traefik.enable=false) so the route
#     survives Sablier stopping the container; sablier.group=penpot on every
#     service so a wake starts the whole stack
#   - explicit mem_limits; secrets from .env (see .env.example) not hardcoded
#
# Deploy + first-user + CF-tunnel DNS: see README.md in this dir.

x-sablier: &sablier
  # Every container in the group must carry these so Sablier manages the whole
  # stack as one unit. Routing lives in the file provider, so disable the
  # docker provider here (it would drop the route the moment Sablier stops it).
  sablier.enable: "true"
  sablier.group: "penpot"
  traefik.enable: "false"

services:
  penpot-frontend:
    image: penpotapp/frontend:2.16
    container_name: penpot-frontend
    restart: unless-stopped
    depends_on:
      - penpot-backend
      - penpot-exporter
      - penpot-mcp
    labels: *sablier
    environment:
      # enable-mcp: the frontend nginx proxies /mcp/* to the penpot-mcp service.
      PENPOT_FLAGS: "disable-registration disable-email-verification disable-secure-session-cookies enable-mcp"
    networks:
      - penpot
      - traefik-public
    # nginx `worker_processes auto` reads _SC_NPROCESSORS_ONLN (system-wide = 20
    # cores), which cpuset affinity does NOT shrink — so it spawns 20 workers
    # (~28MB rss each). Rather than override the baked nginx.conf, give them
    # room; Sablier means this is 0 when idle anyway.
    mem_limit: 700m

  penpot-backend:
    image: penpotapp/backend:2.16
    container_name: penpot-backend
    restart: unless-stopped
    depends_on:
      - penpot-postgres
      - penpot-valkey
    labels: *sablier
    volumes:
      - penpot_assets:/opt/data/assets
    environment:
      # enable-prepl-server: the management REPL on :6063 that manage.py needs
      # (create-profile etc.). Without it those commands get ECONNREFUSED.
      # enable-mcp: backend exposes the MCP RPC the penpot-mcp service consumes.
      PENPOT_FLAGS: "disable-registration disable-email-verification disable-secure-session-cookies enable-prepl-server enable-mcp"
      PENPOT_PUBLIC_URI: "https://penpot.jeffemmett.com"
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:?set in .env}"
      PENPOT_DATABASE_URI: "postgresql://penpot-postgres/penpot"
      PENPOT_DATABASE_USERNAME: "penpot"
      PENPOT_DATABASE_PASSWORD: "${POSTGRES_PASSWORD:?set in .env}"
      PENPOT_REDIS_URI: "redis://penpot-valkey/0"
      PENPOT_ASSETS_STORAGE_BACKEND: "assets-fs"
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: "/opt/data/assets"
      PENPOT_HTTP_SERVER_MAX_BODY_SIZE: "367001600"
      # Telemetry off for a private instance.
      PENPOT_TELEMETRY_ENABLED: "false"
    networks:
      - penpot
    mem_limit: 1200m

  penpot-exporter:
    image: penpotapp/exporter:2.16
    container_name: penpot-exporter
    restart: unless-stopped
    depends_on:
      - penpot-valkey
    labels: *sablier
    environment:
      # The exporter renders via headless Chromium; it talks to the public URI.
      PENPOT_PUBLIC_URI: "http://penpot-frontend:8080"
      PENPOT_REDIS_URI: "redis://penpot-valkey/0"
      # 2.x exporter validates a required secret-key (shared with backend).
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:?set in .env}"
    networks:
      - penpot
    mem_limit: 512m

  # AI control surface — the frontend proxies /mcp/* here when enable-mcp is set.
  # Clients connect at https://penpot.jeffemmett.com/mcp/stream?userToken=<KEY>
  # (per-user key from Penpot → Account → Integrations → MCP Server).
  penpot-mcp:
    image: penpotapp/mcp:2.16
    container_name: penpot-mcp
    restart: unless-stopped
    depends_on:
      - penpot-backend
    labels: *sablier
    environment:
      PENPOT_PUBLIC_URI: "https://penpot.jeffemmett.com"
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:?set in .env}"
    networks:
      - penpot
    mem_limit: 256m

  penpot-postgres:
    image: postgres:15
    container_name: penpot-postgres
    restart: unless-stopped
    stop_signal: SIGINT
    labels: *sablier
    environment:
      POSTGRES_INITDB_ARGS: "--data-checksums"
      POSTGRES_DB: "penpot"
      POSTGRES_USER: "penpot"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set in .env}"
    volumes:
      - penpot_postgres_v15:/var/lib/postgresql/data
    networks:
      - penpot
    mem_limit: 384m

  penpot-valkey:
    image: valkey/valkey:8.1
    container_name: penpot-valkey
    restart: unless-stopped
    labels: *sablier
    command: ["--maxmemory", "128mb", "--maxmemory-policy", "volatile-lfu"]
    networks:
      - penpot
    mem_limit: 192m

volumes:
  penpot_postgres_v15:
  penpot_assets:

networks:
  penpot:
    name: penpot
  traefik-public:
    external: true
