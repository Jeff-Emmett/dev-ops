# Sablier scale-to-zero routing for Penpot (penpot.jeffemmett.com).
# File provider so the route survives Sablier stopping the stack. The whole
# group (frontend/backend/exporter/postgres/valkey) wakes on the first request.
# TLS terminates at the Cloudflare edge; origin is HTTP on `web`.
http:
  middlewares:
    sablier-penpot:
      plugin:
        sablier:
          sablierUrl: http://sablier:10000
          group: penpot
          sessionDuration: 30m
          # Penpot cold start is heavy: Postgres init + the backend JVM boot +
          # frontend. 120s blocking ceiling covers it; the user waits on the
          # first hit after idle, then it's warm for the 30m session.
          blocking:
            timeout: 120s
  routers:
    penpot:
      rule: "Host(`penpot.jeffemmett.com`)"
      entryPoints:
        - web
      middlewares:
        - sablier-penpot
      service: penpot
      priority: 100
  services:
    penpot:
      loadBalancer:
        servers:
          - url: "http://penpot-frontend:8080"
