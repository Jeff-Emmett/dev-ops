## www → apex redirects for all r*.online domains
## Deployed to /root/traefik/config/rspace-www-redirect.yml
##
## Uses file-provider routers with priority 200 to intercept www.* requests
## before the Docker-label routers (default priority ~100) serve them.
## Redirects are 301 (permanent) to signal search engines and browsers.

http:
  middlewares:
    www-to-apex:
      redirectRegex:
        regex: "^https?://www\\.([a-z]+\\.online)(.*)"
        replacement: "https://${1}${2}"
        permanent: true

  routers:
    # rSpace
    www-rspace:
      rule: "Host(`www.rspace.online`)"
      entrypoints:
        - web
      middlewares:
        - www-to-apex
      service: noop@internal
      priority: 200

    # rVote
    www-rvote:
      rule: "Host(`www.rvote.online`)"
      entrypoints:
        - web
      middlewares:
        - www-to-apex
      service: noop@internal
      priority: 200

    # rNotes
    www-rnotes:
      rule: "Host(`www.rnotes.online`)"
      entrypoints:
        - web
      middlewares:
        - www-to-apex
      service: noop@internal
      priority: 200

    # rMaps
