http:
  middlewares:
    sablier-postiz-main:
      plugin:
        sablier:
          sablierUrl: http://sablier:10000
          group: postiz-main
          sessionDuration: 30m
          dynamic:
            displayName: Postiz - Social Media Scheduler
            theme: hacker-terminal
            refreshFrequency: 5s
            showDetails: true

    sablier-postiz-votc:
      plugin:
        sablier:
          sablierUrl: http://sablier:10000
          group: postiz-votc
          sessionDuration: 30m
          dynamic:
            displayName: VOTC Socials
            theme: hacker-terminal
            refreshFrequency: 5s
            showDetails: true

    sablier-postiz-bcrg:
      plugin:
        sablier:
          sablierUrl: http://sablier:10000
          group: postiz-bcrg
          sessionDuration: 30m
          dynamic:
            displayName: Bonding Curve Socials
            theme: hacker-terminal
            refreshFrequency: 5s
            showDetails: true

    sablier-postiz-cc:
      plugin:
        sablier:
          sablierUrl: http://sablier:10000
          group: postiz-cc
          sessionDuration: 30m
          dynamic:
            displayName: Crypto Commons Socials
            theme: hacker-terminal
            refreshFrequency: 5s
            showDetails: true

    sablier-postiz-p2pf:
      plugin:
        sablier:
          sablierUrl: http://sablier:10000
          group: postiz-p2pf
          sessionDuration: 30m
          dynamic:
            displayName: P2P Foundation Socials
            theme: hacker-terminal
            refreshFrequency: 5s
            showDetails: true

  routers:
    # postiz-main removed — demo.rsocials.online handled by Postiz container labels
    postiz-votc:
      rule: "Host(`votc-socials.jeffemmett.com`)"
      entryPoints:
        - web
        - websecure
      middlewares:
        - sablier-postiz-votc
      service: postiz-votc

    postiz-bcrg:
      rule: "Host(`socials.bondingcurve.tech`)"
      entryPoints:
        - web
        - websecure
      middlewares:
        - sablier-postiz-bcrg
      service: postiz-bcrg

    postiz-cc:
      rule: "Host(`socials.crypto-commons.org`)"
      entryPoints:
        - web
        - websecure
      middlewares:
        - sablier-postiz-cc
      service: postiz-cc

    postiz-p2pf:
      rule: "Host(`socials.p2pfoundation.net`)"
      entryPoints:
        - web
        - websecure
      middlewares:
        - sablier-postiz-p2pf
      service: postiz-p2pf

  services:
    postiz-main:
      loadBalancer:
        servers:
          - url: "http://postiz:5000"

    postiz-votc:
      loadBalancer:
        servers:
          - url: "http://postiz-votc:5000"

    postiz-bcrg:
      loadBalancer:
        servers:
          - url: "http://postiz-bcrg:5000"

    postiz-cc:
      loadBalancer:
        servers:
          - url: "http://postiz-cc:5000"

    postiz-p2pf:
      loadBalancer:
        servers:
          - url: "http://postiz-p2pf:5000"
