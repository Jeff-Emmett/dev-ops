## Cloudflare Origin Certificate for translate.p2pfoundation.net
## Issued 2026-05-10, valid through 2041-05-06.
## Bypasses Let's Encrypt rate limits + TLS-ALPN-01 challenge issues
## (Cloudflare Full-Strict trusts CF Origin CA without LE participation).
## CSR + key generated on-host at /root/traefik/certs/origin/.

tls:
  certificates:
    - certFile: /etc/traefik/certs/origin/translate.p2pfoundation.net.crt
      keyFile: /etc/traefik/certs/origin/translate.p2pfoundation.net.key
      stores:
        - default
