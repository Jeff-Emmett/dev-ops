services:
  temporal-shared-postgres:
    image: postgres:16
    container_name: temporal-shared-postgres
    mem_limit: 1g
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    volumes:
      - temporal-shared-postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - postiz-temporal-shared
    healthcheck:
      test: pg_isready -U temporal
      interval: 10s
      timeout: 3s
      retries: 5

  temporal-shared-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: temporal-shared-elasticsearch
    mem_limit: 2g
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - temporal-shared-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - postiz-temporal-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  temporal-shared-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-shared-ui
    mem_limit: 512m
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=postiz-temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    networks:
      - postiz-temporal-shared
    # Internal only — not exposed via Traefik

volumes:
  temporal-shared-postgres-data:
  temporal-shared-elasticsearch-data:

networks:
  postiz-temporal-shared:
    driver: bridge
