services:
  postiz-p2pf:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz-p2pf
    restart: unless-stopped
    environment:
      MAIN_URL: 'https://socials.p2pfoundation.net'
      FRONTEND_URL: 'https://socials.p2pfoundation.net'
      NEXT_PUBLIC_BACKEND_URL: 'https://socials.p2pfoundation.net/api'
      JWT_SECRET: '${JWT_SECRET}'
      DATABASE_URL: 'postgresql://postiz:${POSTGRES_PASSWORD}@postiz-p2pf-postgres:5432/postiz'
      REDIS_URL: 'redis://postiz-p2pf-redis:6379'
      BACKEND_INTERNAL_URL: 'http://localhost:3000'
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: 'false'
      STORAGE_PROVIDER: 'local'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'
      # Temporal connection
      TEMPORAL_HOST: 'temporal:7233'
      # Pocket-ID OIDC Authentication
      POSTIZ_GENERIC_OAUTH: 'true'
      POSTIZ_OAUTH_URL: 'https://auth.ridentity.online'
      POSTIZ_OAUTH_AUTH_URL: 'https://auth.ridentity.online/authorize'
      POSTIZ_OAUTH_TOKEN_URL: 'https://auth.ridentity.online/api/oidc/token'
      POSTIZ_OAUTH_USERINFO_URL: 'https://auth.ridentity.online/api/oidc/userinfo'
      POSTIZ_OAUTH_CLIENT_ID: '764780bd-24dc-42e6-81ab-b0409622e30b'
      POSTIZ_OAUTH_CLIENT_SECRET: 'FDBDeLEbUqGxvWkUjJFrEq2hlvdTz6yc'
      POSTIZ_OAUTH_SCOPE: 'openid profile email'

      # === Email (SMTP via Mailcow / mail.rmail.online)
      EMAIL_PROVIDER: 'nodemailer'
      EMAIL_FROM_NAME: 'P2P Foundation Socials'
      EMAIL_FROM_ADDRESS: 'noreply@rmail.online'
      EMAIL_HOST: 'mailcowdockerized-postfix-mailcow-1'
      EMAIL_PORT: '587'
      EMAIL_SECURE: 'false'
      EMAIL_USER: 'noreply@rmail.online'
      EMAIL_PASS: '${EMAIL_PASS}'
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    volumes:
      - postiz-p2pf-config:/config/
      - postiz-p2pf-uploads:/uploads/
    labels:
      - "traefik.enable=false"
      - "sablier.enable=true"
      - "sablier.group=postiz-p2pf"
      - "traefik.http.routers.postiz-p2pf.rule=Host(`socials.p2pfoundation.net`)"
      - "traefik.http.routers.postiz-p2pf.entrypoints=web,websecure"
      - "traefik.http.services.postiz-p2pf.loadbalancer.server.port=5000"
    networks:
      - traefik-public
      - postiz-p2pf-internal
      - postiz_temporal-network
      - mailcow-network
    depends_on:
      postiz-p2pf-postgres:
        condition: service_healthy
      postiz-p2pf-redis:
        condition: service_healthy

  postiz-p2pf-postgres:
    image: postgres:17-alpine
    container_name: postiz-p2pf-postgres
    labels:
      - "sablier.enable=true"
      - "sablier.group=postiz-p2pf"
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_USER: postiz
      POSTGRES_DB: postiz
    volumes:
      - postiz-p2pf-postgres-data:/var/lib/postgresql/data
    networks:
      - postiz-p2pf-internal
    healthcheck:
      test: pg_isready -U postiz -d postiz
      interval: 10s
      timeout: 3s
      retries: 3

  postiz-p2pf-redis:
    image: redis:7.2
    container_name: postiz-p2pf-redis
    labels:
      - "sablier.enable=true"
      - "sablier.group=postiz-p2pf"
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-p2pf-redis-data:/data
    networks:
      - postiz-p2pf-internal

volumes:
  postiz-p2pf-postgres-data:
  postiz-p2pf-redis-data:
  postiz-p2pf-config:
  postiz-p2pf-uploads:

networks:
  traefik-public:
    external: true
  postiz-p2pf-internal:
    driver: bridge
  postiz_temporal-network:
    external: true
  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network
