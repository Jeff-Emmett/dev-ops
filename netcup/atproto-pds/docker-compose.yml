services:
  atproto-pds:
    image: ghcr.io/bluesky-social/pds:0.4
    container_name: atproto-pds
    restart: unless-stopped
    volumes:
      - pds-data:/pds
      - /opt/infisical/entrypoint-wrapper.sh:/infisical-entrypoint.sh:ro
    entrypoint: ["dumb-init", "--", "/infisical-entrypoint.sh"]
    command: ["node", "--enable-source-maps", "index.js"]
    env_file:
      - .env
    environment:
      - PDS_HOSTNAME=pds.ridentity.online
      - PDS_DATA_DIRECTORY=/pds
      - PDS_BLOBSTORE_DISK_LOCATION=/pds/blocks
      - PDS_DID_PLC_URL=https://plc.directory
      - PDS_BSKY_APP_VIEW_URL=https://api.bsky.app
      - PDS_BSKY_APP_VIEW_DID=did:web:api.bsky.app
      - PDS_REPORT_SERVICE_URL=https://mod.bsky.app
      - PDS_REPORT_SERVICE_DID=did:plc:ar7c4by46qjdydhdevvrndac
      - PDS_CRAWLERS=https://bsky.network
      - PDS_PORT=3000
      - LOG_ENABLED=true
      - NODE_ENV=production
      - INFISICAL_PROJECT_SLUG=claude-ops
      - INFISICAL_SECRET_PATH=/atproto-pds
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atproto-pds.rule=Host(`pds.ridentity.online`)"
      - "traefik.http.routers.atproto-pds.entrypoints=web"
      - "traefik.http.routers.atproto-pds.priority=200"
      - "traefik.http.services.atproto-pds.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/xrpc/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - traefik-public
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pds-data:

networks:
  traefik-public:
    external: true
