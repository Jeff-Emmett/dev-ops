services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    depends_on:
      searxng-valkey:
        condition: service_healthy

    # Infisical secret injection — pulls SEARXNG_SECRET from /searxng path
    volumes:
      - ./entrypoint.sh:/infisical-entrypoint.sh:ro
      - ./settings.yml:/etc/searxng/settings.yml.template:ro
      - ./limiter.toml:/etc/searxng/limiter.toml:ro
    entrypoint: ["/infisical-entrypoint.sh"]
    command: ["/usr/local/searxng/entrypoint.sh"]

    environment:
      # TEMPORARY: SEARXNG_SECRET passed from .env until a scoped Infisical
      # Machine Identity is provisioned. See backlog task for migration plan.
      # The entrypoint will skip Infisical fetch when INFISICAL_CLIENT_ID is
      # unset and use this env var directly when rendering settings.yml.
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_BASE_URL: https://search.jeffemmett.com/
      BIND_ADDRESS: 0.0.0.0:8080
      INSTANCE_NAME: searxng-jeffemmett

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTP via Cloudflare tunnel
      - "traefik.http.routers.searxng.rule=Host(`search.jeffemmett.com`)"
      - "traefik.http.routers.searxng.entrypoints=web"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"
      # HTTPS with Let's Encrypt (direct access)
      - "traefik.http.routers.searxng-secure.rule=Host(`search.jeffemmett.com`)"
      - "traefik.http.routers.searxng-secure.entrypoints=websecure"
      - "traefik.http.routers.searxng-secure.service=searxng"
      - "traefik.http.routers.searxng-secure.tls=true"
      - "traefik.http.routers.searxng-secure.tls.certresolver=letsencrypt-dns01"

    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Expose on host loopback only — for agents to reach without going through Traefik
    ports:
      - "127.0.0.1:8888:8080"

    networks:
      - traefik-public
      - ai-internal
      - searxng-internal

    mem_limit: 512m
    cpus: 1

  searxng-valkey:
    image: valkey/valkey:8-alpine
    container_name: searxng-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --save
      - "30"
      - "1"
      - --loglevel
      - warning
    volumes:
      - searxng-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - searxng-internal
    mem_limit: 128m
    cpus: 0.5

volumes:
  searxng-valkey-data:

networks:
  traefik-public:
    external: true
  ai-internal:
    external: true
  searxng-internal:
    driver: bridge
