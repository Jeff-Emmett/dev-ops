# SearXNG limiter — current (post-2025) schema.
# See default at /usr/local/searxng/searx/limiter.toml for reference.

[botdetection]
ipv4_prefix = 32
ipv6_prefix = 56

# Trust X-Forwarded-For from these IPs (Traefik + Cloudflare tunnel sidecar
# both reach SearXNG from a Docker bridge address, so we accept the real
# client IP they forward).
trusted_proxies = [
  "127.0.0.0/8",
  "::1",
  "172.16.0.0/12",
  "10.0.0.0/8",
  "192.168.0.0/16",
  "fd00::/8",
]

[botdetection.ip_limit]
filter_link_local = false
link_token = false

[botdetection.ip_lists]
# Unrestricted access for local agents (Claude Code MCP, Claude Mail Agent
# running in containers on the docker networks). Public users come through
# Traefik/Cloudflare with their real IP and get the normal limiter rules.
block_ip = []
pass_ip = [
  "127.0.0.0/8",
  "::1",
  "172.16.0.0/12",
  "10.0.0.0/8",
  "192.168.0.0/16",
  "fd00::/8",
]
pass_searxng_org = true
