services:
  ipfs:
    image: ipfs/kubo:v0.34.1
    container_name: ipfs
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0
    environment:
      - IPFS_PROFILE=server
      - IPFS_FD_MAX=4096
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/export
      - ./init.sh:/container-init.d/001-config.sh:ro
    ports:
      - "4001:4001"        # Swarm TCP (public, needed for DHT)
      - "4001:4001/udp"    # Swarm QUIC
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Public read-only gateway
      - "traefik.http.routers.ipfs-gw.rule=Host(`ipfs.jeffemmett.com`)"
      - "traefik.http.routers.ipfs-gw.entrypoints=websecure"
      - "traefik.http.routers.ipfs-gw.tls.certresolver=letsencrypt"
      - "traefik.http.services.ipfs-gw.loadbalancer.server.port=8080"
      # Authenticated API (write/pin) — internal only
      - "traefik.http.routers.ipfs-api.rule=Host(`ipfs-api.jeffemmett.com`)"
      - "traefik.http.routers.ipfs-api.entrypoints=websecure"
      - "traefik.http.routers.ipfs-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ipfs-api.loadbalancer.server.port=5001"
      - "traefik.http.routers.ipfs-api.middlewares=ipfs-api-auth@docker"
      # IP whitelist: only Netcup localhost + Tailscale mesh + Docker internal
      - "traefik.http.middlewares.ipfs-api-auth.ipallowlist.sourcerange=127.0.0.1/32,100.64.0.0/10,172.16.0.0/12"
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ipfs_data:
  ipfs_staging:

networks:
  traefik-public:
    external: true
