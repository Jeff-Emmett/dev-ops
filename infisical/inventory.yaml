# ========================================
# Tier 2: Third-party apps (volume-mount wrapper)
# ========================================
tier2_thirdparty:
  # Pilot migration (2026-06-06): proved the wrapper pattern end-to-end.
  - slug: umami
    service: Umami Analytics
    location: /opt/apps/umami
    runtime: node
    secrets_count: 2
    status: migrated
    batch: pilot
    notes: "Wrapper entrypoint on umami container (node runtime). DATABASE_URL stored
      as full string in Infisical (compose-interpolation can't be runtime-injected).
      umami-db: POSTGRES_PASSWORD removed (DB already initialized, value retained in volume).
      Backups: .env.pre-infisical-* + docker-compose.yml.bak-*. Project id 5041ac53."

  - slug: defectfi
    service: DeFectFi (defectfi.xyz + foxsong/chorus)
    location: /opt/apps/defectfi
    runtime: node
    secrets_count: 5
    status: migrated
    batch: pilot
    notes: "Public Next.js site. Wrapper on defectfi container; INFISICAL_SECRET_PATH=/runtime
      scopes injection to FOXSONG_DEN_TOKEN only (wrapper fetches RECURSIVELY). SMTP_* stored
      in /smtp NOT injected (preserves prior behavior — compose never passed them).
      NEXT_PUBLIC_SAFE_ADDRESS = literal (non-secret). IMAGE_TAG pinned in .env (was unset →
      would fall to nonexistent :latest). relay service untouched. Project id 021353fd."

  - slug: email-relay
    service: Email Relay (email-relay.jeffemmett.com)
    location: /opt/apps/email-relay
    runtime: python
    secrets_count: 7
    status: migrated
    batch: pilot
    notes: "Clean env_file case: all 7 secrets at root, all injected (python3 runtime).
      .env reduced to INFISICAL_* (still env_file-loaded so wrapper gets creds). read_only
      rootfs fine. :latest is the live image. Project id e0c022fa."

  - slug: erowid-bot
    service: Erowid Bot (erowid.psilo-cyber.net)
    location: /opt/apps/erowid-bot
    runtime: python
    secrets_count: 13
    status: migrated
    batch: pilot
    notes: "env_file + DB sidecar. 13 secrets at root all injected (uvicorn/python3).
      erowid-db (pgvector) left untouched (already-init, :-default interpolation).
      IMAGE_TAG pinned e3d92153. Benign pre-existing Ollama warmup warning (deferred load).
      Project id b42d9f99."

  # twenty CRM cluster (migrated 2026-06-07, multi-container pattern)
  - slug: twenty / twenty-votc / twenty-cc / twenty-cosmolocal
    service: Twenty CRM (4 instances)
    location: /opt/apps/{twenty,twenty-votc,twenty-cc,twenty-cosmolocal}
    runtime: node
    secrets_count: 15
    status: migrated
    batch: medium
    notes: "Multi-container: wrapper on BOTH server + worker. PG_DATABASE_URL stored full
      (resolves compose interpolation). postgres sidecar: POSTGRES_USER/DB made LITERAL,
      POSTGRES_PASSWORD dropped, healthcheck ${PG_DATABASE_USER} de-interpolated (else
      stripping .env blanks the healthcheck user -> unhealthy; this was the v1 failure+rollback).
      Dirs are NOT git repos -> changes on disk only. twenty-rnetwork dir is INACTIVE (no
      containers) -> skipped. Script: /tmp/twenty_migrate.sh."

