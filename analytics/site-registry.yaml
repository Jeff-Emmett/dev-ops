# Umami analytics — source of truth for per-site website IDs.
# Platform: Umami v3.0.3 @ https://analytics.rspace.online (tracker: collect.js)
# Minted via mint.sql (idempotent on domain). Edit mint.sql + re-run to add sites,
# then update this file and the hub auto-discovers from the DB.
#
# wired: true  = snippet deployed to the live site
# wired: false = website_id exists in Umami, snippet NOT yet on the site
#
# delivery:
#   env    = app reads UMAMI_URL + UMAMI_WEBSITE_ID and emits the tag itself
#   static = inject <head> tag directly into template/index.html

umami_url: https://analytics.rspace.online
tracker_script: collect.js

sites:
  # ---- already wired (pre-existing) ----
  - name: rStack
    domain: rspace.online            # + 24 *.online subdomains incl. rdata.online
    website_id: 292f6ac6-79f8-497b-ba6a-7a51e3b87b9f
    repo: /opt/websites/rspace-online
    delivery: env
    wired: true
    note: single shared ID for the whole rStack; segment by hostname in the hub

