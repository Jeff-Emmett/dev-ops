services:
  analytics-hub:
    build: .
    image: analytics-hub:latest
    container_name: analytics-hub
    restart: unless-stopped
    env_file: .env          # DATABASE_URL=postgresql://umami_ro:...@umami-db:5432/umami
    mem_limit: 256m
    ports:
      - "100.64.0.2:8899:8000"   # Tailscale-only: reachable at netcup.mesh.jeffemmett.com:8899
    networks:
      - umami_umami-internal   # reach umami-db (read-only role)
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.analytics-hub.rule=Host(`analytics-hub.jeffemmett.com`)
      - traefik.http.routers.analytics-hub.entrypoints=web
      - traefik.http.services.analytics-hub.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

networks:
  umami_umami-internal:
    external: true
  traefik-public:
    external: true
