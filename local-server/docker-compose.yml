# Ollama with AMD ROCm acceleration for Strix Halo iGPU
# Minisforum MS-S1 Max — AMD Ryzen AI Max+ 395, 128GB unified RAM
#
# Deploy: docker compose up -d
# Models are pulled by setup.sh on first boot

services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama-strix
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      # ROCm device targeting — gfx1150 is Strix Halo iGPU
      - HSA_OVERRIDE_GFX_VERSION=11.5.0
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 112G
        reservations:
          memory: 16G
    # ipc: host improves shared memory perf for large models
    ipc: host

volumes:
  ollama-data:
    driver: local
